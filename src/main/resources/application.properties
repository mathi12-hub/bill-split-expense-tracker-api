spring.application.name=bill-split-expense-tracker

# ---- MySQL Datasource ----
spring.datasource.url=jdbc:mysql://localhost:3306/billsplit_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# update = auto-creates/updates tables from entities on startup (good for dev)
# switch to 'validate' or 'none' in production and manage schema via schema.sql / migrations
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---- Server ----
server.port=8080

# ---- Logging ----
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.billsplit.api=DEBUG
